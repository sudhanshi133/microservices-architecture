server:
  port: 9000

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: product-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/product/**

            - id: order-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/order/**

            - id: inventory-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/inventory/**